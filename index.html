<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="light only" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Wisteria" />
<meta name="theme-color" content="#F7F4FB" />
<title>Wisteria</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%235B3FA8'/%3E%3Ctext x='50' y='66' font-size='46' text-anchor='middle' fill='%23F7F5FA' font-family='Helvetica,Arial,sans-serif'%3E%E2%9C%B6%3C/text%3E%3C/svg%3E" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;1,14..32,300;1,14..32,400&family=Fragment+Mono&display=swap');
:root{
  --paper:#F7F4FB; --card:#FCFAFE; --ink:#2A2140; --faint:#6E6480;
  --line:#DFD7EC; --violet:#5B3FA8; --wisteria:#A78BD4; --plum:#3E2C63;
  --bloom:#EFE9F8; --petal-a:#C9B8EC; --petal-b:#B39DDB; --petal-c:#8F76C4;
  --disp:'Space Grotesk','Helvetica Neue',Arial,sans-serif;
  --body:'Inter','Helvetica Neue',Arial,sans-serif;
  --mono:'Fragment Mono',ui-monospace,monospace;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html{color-scheme:light only;}
body{margin:0; color:var(--ink);
  background:
    radial-gradient(90vw 50vh at 15% -8%, #EDE5F9 0%, rgba(237,229,249,0) 60%),
    radial-gradient(70vw 40vh at 100% 0%, #F1EBFA 0%, rgba(241,235,250,0) 55%),
    var(--paper);
  font-family:var(--body); font-size:15px; line-height:1.6;
  min-height:100vh; padding-bottom:calc(40px + env(safe-area-inset-bottom));}
::selection{background:var(--petal-a); color:var(--plum);}

/* ---- the vine ---- */
.vinewrap{position:relative; height:96px; max-width:640px; margin:0 auto;
  pointer-events:none; overflow:visible;}
.vine{position:absolute; top:0; left:0; width:100%; height:150px; overflow:visible;}
.raceme{transform-origin:50% 0;}
@keyframes sway{from{transform:rotate(-1.6deg);} to{transform:rotate(1.8deg);}}
.raceme.s1{animation:sway 7s ease-in-out infinite alternate;}
.raceme.s2{animation:sway 9s ease-in-out infinite alternate; animation-delay:-3s;}
.raceme.s3{animation:sway 11s ease-in-out infinite alternate; animation-delay:-6s;}
.raceme.s4{animation:sway 8s ease-in-out infinite alternate; animation-delay:-1.5s;}

header{max-width:640px; margin:0 auto; padding:0 18px;}
.metarow{display:flex; justify-content:space-between; align-items:baseline;
  font-family:var(--mono); font-size:10px; letter-spacing:.06em;
  text-transform:uppercase; color:var(--faint); margin-bottom:8px;}
h1{font-family:var(--disp); font-size:34px; font-weight:700;
  margin:0; letter-spacing:-.03em; color:var(--plum);}
h1 .dot{color:var(--violet);}
.greet{font-size:15.5px; font-weight:300; font-style:italic; color:var(--plum);
  margin:6px 0 0;}
.openrule{height:3px; background:var(--ink); margin:12px 0 0;}

main{max-width:640px; margin:0 auto; padding:16px 18px 8px;}
.lovecard{background:var(--bloom); border:1px solid var(--petal-a); border-radius:3px;
  padding:14px 16px; margin:6px 0 2px; font-size:15px; font-weight:300;
  font-style:italic; color:var(--plum); display:flex; gap:10px; align-items:flex-start;}
.lovecard .bl{color:var(--violet); font-style:normal; flex:none;}
.eyebrow{font-family:var(--mono); font-size:10px; letter-spacing:.08em;
  text-transform:uppercase; color:var(--violet); margin:24px 0 6px;
  display:flex; justify-content:space-between; align-items:baseline;}
.eyebrow .bl{color:var(--wisteria); margin-right:7px; font-size:11px;}
.eyebrow .n{color:var(--faint); letter-spacing:.04em;}
.card{background:var(--card); border:1px solid var(--line); border-radius:3px;
  padding:16px; margin-bottom:2px; position:relative;}
.rtitle{font-family:var(--disp); font-size:21px; font-weight:600;
  margin:0 0 4px; letter-spacing:-.02em; color:var(--plum);}
.rtag{font-family:var(--mono); font-size:10px; letter-spacing:.06em;
  text-transform:uppercase; color:var(--faint); margin-bottom:10px;}
.rtag b{color:var(--violet); font-weight:400;}
.rbody{font-size:15px; font-weight:300; line-height:1.65; margin:0;}
.rbody.fold{display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow:hidden;}
.breathline{margin-top:12px; padding-top:10px; border-top:1px solid var(--line);
  font-size:13.5px; font-style:italic; color:var(--faint);}
.rowbtns{display:flex; gap:8px; margin-top:12px;}
.ghost{background:none; border:1px solid var(--line); border-radius:3px;
  padding:8px 14px; font-family:var(--mono); font-size:10px; letter-spacing:.06em;
  text-transform:uppercase; color:var(--faint); cursor:pointer;}
.ghost:hover{border-color:var(--wisteria); color:var(--violet);}
.ghost.kept{background:var(--violet); border-color:var(--violet); color:#fff;}

/* two-choice kindness */
.carechoice{display:flex; flex-direction:column; gap:8px;}
.careopt{display:flex; gap:12px; align-items:flex-start; text-align:left;
  background:var(--card); border:1px solid var(--line); border-radius:3px;
  padding:13px 14px; cursor:pointer; font-family:var(--body); width:100%;}
.careopt:hover{border-color:var(--wisteria);}
.careopt.picked{border-color:var(--violet); background:var(--bloom);}
.careopt .tick{flex:none; width:20px; height:20px; border:1px solid var(--line);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:11px; color:transparent; margin-top:2px;}
.careopt.picked .tick{background:var(--violet); border-color:var(--violet); color:#fff;}
.careline{font-family:var(--disp); font-size:15.5px; font-weight:500;
  margin:0 0 3px; letter-spacing:-.01em; color:var(--plum);}
.carewhy{font-size:13px; font-weight:300; color:var(--faint); margin:0;}
.careor{text-align:center; font-family:var(--mono); font-size:10px;
  letter-spacing:.08em; text-transform:uppercase; color:var(--wisteria); margin:0;}

.pkcard{display:flex; gap:14px; align-items:flex-start;}
.pkimg{width:96px; height:96px; flex:none; background:var(--bloom);
  border-radius:58% 42% 55% 45% / 48% 55% 45% 52%;
  display:flex; align-items:center; justify-content:center;}
.pkimg img{width:82px; height:82px; object-fit:contain;}
.pkfall{font-family:var(--disp); font-size:30px; color:var(--wisteria);}
.pkname{font-family:var(--disp); font-size:16px; font-weight:600;
  margin:0 0 1px; letter-spacing:-.01em; color:var(--plum);}
.pkdex{font-family:var(--mono); font-size:10px; color:var(--faint);
  letter-spacing:.05em; margin-left:6px; font-weight:400;}
.pkgenus{font-family:var(--mono); font-size:10px; letter-spacing:.05em;
  text-transform:uppercase; color:var(--faint); margin:0 0 6px;}
.pkflavor{font-size:13.5px; font-weight:300; line-height:1.55; margin:0 0 6px;}
.pknote{font-size:13.5px; font-weight:300; font-style:italic; line-height:1.55;
  margin:0; color:var(--violet);}

/* breathing widget */
.breathwrap{display:flex; flex-direction:column; align-items:center;
  padding:6px 0 10px;}
.bstage{width:200px; height:200px; flex:none; display:flex;
  align-items:center; justify-content:center; overflow:hidden;}
.bcircle{width:112px; height:112px; border-radius:50%;
  background:radial-gradient(circle at 38% 32%, var(--petal-a), var(--petal-c));
  box-shadow:0 0 0 10px rgba(167,139,212,.12), 0 0 0 20px rgba(167,139,212,.06);
  transform:scale(1); will-change:transform;}
.bword{font-family:var(--disp); font-size:14px; font-weight:500; color:var(--plum);
  letter-spacing:.02em; margin:2px 0 2px; min-height:20px;}
.bcount{font-family:var(--mono); font-size:10px; letter-spacing:.08em;
  text-transform:uppercase; color:var(--faint);}

.kept{padding:12px 2px; border-bottom:1px solid var(--line);}
.kept:last-child{border-bottom:none;}
.kmeta{font-family:var(--mono); font-size:10px; letter-spacing:.05em;
  text-transform:uppercase; color:var(--faint); margin-bottom:3px;}
.kmeta .bl{color:var(--wisteria); margin-right:6px;}
.ktitle{font-family:var(--disp); font-size:14.5px; font-weight:600; margin:0;
  letter-spacing:-.01em; color:var(--plum);}
.kbody{font-size:13.5px; font-weight:300; color:var(--faint); margin:4px 0 0;}
.krm{background:none; border:none; color:var(--faint); font-family:var(--mono);
  font-size:10px; text-transform:uppercase; letter-spacing:.05em; cursor:pointer;
  padding:4px 0 0;}
.krm:hover{color:var(--violet);}
.empty{text-align:center; color:var(--faint); font-style:italic;
  padding:22px 0; font-size:14px; font-weight:300;}
.foot{text-align:center; font-family:var(--mono); font-size:10px;
  letter-spacing:.05em; color:var(--faint); padding:26px 18px 8px;}
button:focus-visible{outline:2px solid var(--violet); outline-offset:2px;}
@media (prefers-reduced-motion: reduce){*{transition:none !important; animation:none !important;}}
</style>
</head>

<header>
  <div class="metarow">
    <span>Wisteria &middot; a soft place</span>
    <span id="dateLbl"></span>
  </div>
  <h1>Wisteria<span class="dot">.</span></h1>
  <p class="greet" id="greet"></p>
  <div class="openrule"></div>
</header>

<main id="main"></main>
<div class="foot">Everything gentle you do here is roots.</div>

<script>
"use strict";
/* ------------------------------------------------------------------
   Wisteria - one screen, one file, no dependencies, localStorage only.
   Reading library: 26 hand-written + (12 lenses x 63 principles)
   = 782 unique daily readings, a little over two years.
------------------------------------------------------------------ */

const LS_KEY = "wisteria.v2";
const PK_KEY = "wisteria.pkcache";

let store = loadStore();
let pkCache = loadCache();
function loadStore(){
  try{ const s = JSON.parse(localStorage.getItem(LS_KEY));
       return (s && Array.isArray(s.kept)) ? s : {kept:[]}; }
  catch(e){ return {kept:[]}; }
}
function saveStore(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(store)); }catch(e){} }
function loadCache(){
  try{ const c = JSON.parse(localStorage.getItem(PK_KEY));
       return (c && typeof c === "object" && !Array.isArray(c)) ? c : {}; }
  catch(e){ return {}; }
}
function saveCache(){ try{ localStorage.setItem(PK_KEY, JSON.stringify(pkCache)); }catch(e){} }

/* ---------- dates, greeting, special days ---------- */
function dkey(d){ d=d||new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function dayNumber(d){ d=d||new Date();
  return Math.floor(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())/86400000); }
function niceDate(d){ d=d||new Date();
  return d.toLocaleDateString("en-US",{weekday:"long", month:"long", day:"numeric"}); }
function greetBucket(d){ d=d||new Date(); const h=d.getHours();
  return h<12 ? "morning" : (h<17 ? "afternoon" : "evening"); }
function greeting(){ return "good "+greetBucket()+", my love."; }
function specialNote(d){ d=d||new Date();
  const m=d.getMonth()+1, day=d.getDate();
  if(m===3 && day===1) return "happy birthday, my love. the universe is brighter with you and your light in it.";
  if(m===10 && day===28) return "happy anniversary, my love. i love doing life with you.";
  return null;
}

/* ---------- hand-written readings ---------- */
const HAND = [
{t:"The valley spirit", p:"Tao Te Ching",
 b:"The Tao Te Ching says the valley spirit never dies, and calls it the mysterious female: the low, open, receiving place where every stream ends up and everything green begins. Power, it insists, does not live at the summit. It lives in the valley, in whoever is soft enough to receive and patient enough to grow things.",
 br:"Be the valley for ten minutes today: low, open, unimpressed by summits."},
{t:"Water wins by yielding", p:"Tao Te Ching",
 b:"Nothing in the world is softer than water, says the old book, and nothing is better at wearing down the hard. The stone does not notice it is losing. Softness is not the opposite of strength; it is the patient form of it.",
 br:"Pick one hard thing today and be water at it: gentle, repeated, unbothered."},
{t:"Mother of ten thousand things", p:"Tao Te Ching",
 b:"The Tao is called the mother of the ten thousand things: everything that exists was carried, fed, and let go by something quieter than itself. The world runs on unglamorous tending. Every act of care you do today puts you in the oldest lineage there is.",
 br:"Tend one small thing today and count yourself among the mothers of the world."},
{t:"Guanyin listens", p:"Guanyin",
 b:"Guanyin is the one who hears the cries of the world, and notice the choice: hearing, not fixing. Her compassion begins as pure attention, the way still water receives the whole moon without breaking. Sometimes the kindest thing you can offer anyone, including yourself, is to simply and fully listen.",
 br:"Listen to one person today, or to yourself, without planning a reply."},
{t:"Tara does not hesitate", p:"Tara",
 b:"Green Tara is painted with one foot already stepping off her lotus, because compassion, in her school, does not form a committee first. She is the swift kind of kindness: the glass of water fetched, the blanket brought, the text answered. Small immediate care is a complete spiritual practice.",
 br:"Do one kind thing today the moment you think of it."},
{t:"Chiyo-ni and the morning glory", p:"Chiyo-ni",
 b:"The poet Chiyo-ni found a morning glory wound around her well bucket at dawn, and rather than tear it free she went to the neighbors to borrow water. A whole philosophy in one small decision: the flower's morning mattered, and inconvenience was a fair price for tenderness. Some efficiencies are worth losing.",
 br:"Let one small beautiful thing inconvenience you today, graciously."},
{t:"The moon in a dewdrop", p:"Dogen",
 b:"Dogen wrote that the whole moon and the entire sky fit in a single dewdrop on a blade of grass. You do not need a bigger life to hold something vast. One honest moment, fully attended, contains as much sky as anyone ever gets.",
 br:"Give one ordinary moment today your entire attention, briefly."},
{t:"One time, one meeting", p:"the tea room",
 b:"The tea masters bow over every cup because of ichigo ichie: this gathering, exactly this one, will never happen again. Not because life is short, but because each moment is unrepeatable and therefore precious by definition. Today is a cup that will be offered exactly once.",
 br:"Treat one routine moment today as the once-in-a-lifetime event it technically is."},
{t:"Bathing in trees", p:"shinrin-yoku",
 b:"The Japanese prescribe shinrin-yoku, forest bathing: no hiking goals, no step counts, just being under trees while the trees do what they do. The forest lowers blood pressure without being asked to. Some healing requires nothing from you but showing up beneath it.",
 br:"Stand near something green today for five unhurried minutes."},
{t:"The empty cup", p:"a Zen story",
 b:"A professor once visited the master Nan-in, who poured tea until the cup overflowed and kept pouring. Like this cup, said Nan-in, you are full of your own opinions; how can I show you Zen unless you first empty your cup? An emptied mind is not ignorance. It is room.",
 br:"Enter one conversation today with an empty cup and see what gets poured."},
{t:"Rengetsu's clay", p:"Otagaki Rengetsu",
 b:"The nun Rengetsu, widowed and orphaned over and over, made her living shaping tea ware and writing poems on the pots, and her sorrow made the clay gentler, not harder. She is proof that a heart can be broken repeatedly and still choose to make beautiful useful things. Grief and grace can share one pair of hands.",
 br:"Make or mend one small useful thing today, at whatever pace your heart is at."},
{t:"Spring does the growing", p:"a Zen poem",
 b:"An old Zen verse says: sitting quietly, doing nothing, spring comes, and the grass grows by itself. It is not an argument for laziness but a reminder about jurisdiction. A great deal of what you worry over is grass, and grass has never once needed supervision.",
 br:"Name one thing you are supervising that would grow without you, and clock out of it."},
{t:"The bamboo bends", p:"the garden",
 b:"In the snow country they plant bamboo beside the house because it bends under the drifts that snap the stiff trees, then stands back up in the thaw. Flexibility is a winter survival skill. Bending today is not breaking; it is the technique for being upright in spring.",
 br:"Where you are braced today, soften one degree on purpose."},
{t:"Yin keeps half the world", p:"yin",
 b:"Yin is the moon half of everything: night, rest, water, winter, the inward turn. It is not the lesser half; nothing seeds, sleeps, or heals in full sun. When your day asks for quiet instead of output, that is not you failing the light. That is you keeping the balance the world actually runs on.",
 br:"Give something its yin today: rest before you are desperate for it."},
{t:"The lotus keeps its roots in the mud", p:"the lotus",
 b:"The lotus is the East's favorite argument: roots in the mud, face in the light, and no embarrassment about either end. The mud is not the shameful backstory of the flower. It is the ingredients.",
 br:"Thank one muddy chapter of your life for one thing it grew."},
{t:"Metta begins at home", p:"metta",
 b:"The loving-kindness practice starts, by design, with yourself: may I be safe, may I be well, may I live with ease. Only then does it widen to loved ones, strangers, difficult people, all beings. The Buddha ordered it that way on purpose. You cannot pour tea from an empty pot.",
 br:"May I be safe. May I be well. May I live with ease. Once through, slowly, and mean it."},
{t:"The cloud in this page", p:"Thich Nhat Hanh",
 b:"Thich Nhat Hanh liked to show people a sheet of paper and point out the cloud in it: no cloud, no rain; no rain, no tree; no tree, no page. He called it interbeing. You have never once gotten through a day alone, and you are not doing so now; a hundred quiet hands are holding today up with you.",
 br:"Trace one ordinary object back to the rain, and feel the company."},
{t:"The moon behind clouds", p:"yugen",
 b:"Japanese aesthetics has a word, yugen, for the beauty of things partly hidden: the moon behind clouds, the boat disappearing behind the island. Not everything lovely needs to be fully visible or fully understood. Some of what is best in you can stay veiled and still be working.",
 br:"Let one thing stay mysterious today, including possibly your own mood."},
{t:"The gentleness of passing things", p:"mono no aware",
 b:"Mono no aware is the soft ache of knowing the cherry blossoms fall, and the understanding that they are more beautiful, not less, because they do. Impermanence is not the tragedy in the story. It is what makes anything precious enough to notice.",
 br:"Notice one passing thing today and let it be lovelier for passing."},
{t:"Kannon's thousand hands", p:"Kannon",
 b:"Kannon is carved with a thousand arms because compassion at scale is not one grand gesture but a thousand small ones: an arm for every kind of help. You do not need a heroic act today. You need one hand doing one small thing, which is exactly how the statue does it.",
 br:"Be one of the thousand hands today: one small help, done and released."},
{t:"The paper lantern", p:"the lantern",
 b:"A paper lantern holds one small flame behind the thinnest possible wall, and it is enough to walk home by. You are not required to light the whole road. A small warmth, honestly kept, is a working light.",
 br:"Keep one small flame today: one pleasure, one comfort, guarded like a lantern."},
{t:"The plum blooms in snow", p:"the plum branch",
 b:"East Asian poets gave the winter plum the seat of honor because it blooms while snow is still falling, fragrant in weather that argues against flowers entirely. Courage is not waiting for conditions to improve. It is blooming a little anyway, on the branch you are on, in the weather you have.",
 br:"Do one small blooming thing today without waiting for better weather."},

/* ---------- library assembly: 26 + 12x63 = 782 unique readings ---------- */
function mulberry(seed){ return function(){
  seed |= 0; seed = seed + 0x6D2B79F5 | 0;
  let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
};}
function slotTitle(s){ return ("h" in s) ? HAND[s.h].t : PRINCIPLES[s.ci].tt; }
function buildLib(){
  const lib = [];
  for(let h=0; h<HAND.length; h++) lib.push({h});
  for(let li=0; li<LENSES.length; li++)
    for(let ci=0; ci<PRINCIPLES.length; ci++) lib.push({li, ci});
  const rnd = mulberry(20260716);
  for(let i=lib.length-1; i>0; i--){
    const j = Math.floor(rnd()*(i+1)); [lib[i],lib[j]] = [lib[j],lib[i]];
  }
  // Repair pass: no title on two consecutive days, wraparound included.
  const L = lib.length;
  for(let pass=0; pass<3; pass++){
    let fixed = true;
    for(let i=0; i<L; i++){
      const prev = lib[(i-1+L)%L], next = lib[(i+1)%L];
      if(slotTitle(lib[i]) !== slotTitle(prev)) continue;
      let swapped = false;
      for(let j=(i+2)%L, step=0; step<L-3; j=(j+1)%L, step++){
        const jp = lib[(j-1+L)%L], jn = lib[(j+1)%L];
        if(slotTitle(lib[j]) === slotTitle(prev)) continue;
        if(slotTitle(lib[j]) === slotTitle(next)) continue;
        if(slotTitle(lib[i]) === slotTitle(jp)) continue;
        if(slotTitle(lib[i]) === slotTitle(jn)) continue;
        [lib[i],lib[j]] = [lib[j],lib[i]]; swapped = true; break;
      }
      if(!swapped) fixed = false;
    }
    if(fixed) break;
  }
  return lib;
}
const LIB = buildLib();
function readingAt(n){
  const slot = LIB[((n % LIB.length) + LIB.length) % LIB.length];
  if("h" in slot) return HAND[slot.h];
  const L = LENSES[slot.li], C = PRINCIPLES[slot.ci];
  return {t: C.tt, p: L.p, b: L.lore + " " + C.x, br: C.br};
}
function todayReading(){ return readingAt(dayNumber()); }

const TYPE_NOTES = {

function dexOrder(){
  const a = []; for(let i=1;i<=DEX_MAX;i++) a.push(i);
  const rnd = mulberry(19980322);
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(rnd()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; }
  return a;
}
const DEX = dexOrder();
function dexIdFor(n){ return DEX[((n % DEX.length) + DEX.length) % DEX.length]; }
function todayDexId(){ return dexIdFor(dayNumber()); }

const NAME_FIX = {
  "mr-mime":"Mr. Mime", "mime-jr":"Mime Jr.", "mr-rime":"Mr. Rime",
  "type-null":"Type: Null", "nidoran-f":"Nidoran ♀", "nidoran-m":"Nidoran ♂",
  "farfetchd":"Farfetch'd", "sirfetchd":"Sirfetch'd", "flabebe":"Flabébé"
};

function titleName(raw){
  const k = String(raw).toLowerCase();
  if(NAME_FIX[k]) return NAME_FIX[k];
  return k.split("-").map(w => w.charAt(0).toUpperCase()+w.slice(1)).join("-");
}
function noteFor(id, types){
  if(PK_NOTES[id]) return PK_NOTES[id];
  const t = (types && types[0]) || "normal";
  const pool = TYPE_NOTES[t] || TYPE_NOTES.normal;
  return pool[((dayNumber() % pool.length) + pool.length) % pool.length];
}
const GRIM = /\bdead\b|\bdie\b|\bdied\b|\bdeath\b|corpse|curse|\bhell\b|kidnap|drags? (it |them |people |children )?(away|off|into)|steal(s|ing)? .*(soul|life|spirit)|suffocat|graveyard|lifespan.*end|eats? (the )?(soul|dream)s?/i;
function pickFlavor(entries){
  const en = (entries || []).filter(e => e.language && e.language.name === "en")
    .map(e => String(e.flavor_text || "").replace(/[\n\f\r\u00ad]+/g," ").replace(/\s+/g," ").trim())
    .filter(s => s.length > 0);
  if(!en.length) return "";
  const gentle = en.find(s => !GRIM.test(s));
  return gentle || en[0];
}

/* ---------- state ---------- */
let expanded = false;
let currentDay = dayNumber();
let currentGreet = greetBucket();
let pk = {id: todayDexId(), name:null, genus:null, flavor:null, note:null};
const kkey = r => r.t + "\u00a7" + r.p;
const isKept = r => store.kept.some(k => (k.k || (k.t+"\u00a7"+k.p)) === kkey(r));

/* ---------- render ---------- */
const $ = s => document.querySelector(s);
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function render(){
  $("#dateLbl").textContent = niceDate();
  $("#greet").textContent = greeting();
  const r = todayReading(), kept = isKept(r);
  const [c1, c2] = todayCarePair(), pick = carePickToday();
  const note = specialNote();
  $("#main").innerHTML = `
  ${note ? `<div class="lovecard"><span class="bl">\u273f</span><span>${esc(note)}</span></div>` : ""}

  <div class="eyebrow"><span><span class="bl">\u273f</span>Today's reading</span></div>
  <div class="card">
    <p class="rtitle">${esc(r.t)}</p>
    <div class="rtag">from <b>${esc(r.p)}</b></div>
    <p class="rbody ${expanded?"":"fold"}">${esc(r.b)}</p>
    ${expanded ? `<div class="breathline">${esc(r.br)}</div>` : ""}
    <div class="rowbtns">
      <button class="ghost" id="expand">${expanded ? "Fold" : "Read more"}</button>
      <button class="ghost ${kept?"kept":""}" id="keep">${kept ? "Kept \u2713" : "Keep this"}</button>
    </div>
  </div>

  <div class="eyebrow"><span><span class="bl">\u273f</span>One kindness for the body</span><span class="n">pick one</span></div>
  <div class="carechoice">
    <button class="careopt ${pick===c1?"picked":""}" data-care="${c1}">
      <span class="tick">\u2713</span>
      <span><span class="careline">${esc(CARE[c1].a)}</span><br/><span class="carewhy">${esc(CARE[c1].w)}</span></span>
    </button>
    <p class="careor">or</p>
    <button class="careopt ${pick===c2?"picked":""}" data-care="${c2}">
      <span class="tick">\u2713</span>
      <span><span class="careline">${esc(CARE[c2].a)}</span><br/><span class="carewhy">${esc(CARE[c2].w)}</span></span>
    </button>
  </div>

  <div class="eyebrow"><span><span class="bl">\u273f</span>Pokemon of the day</span></div>
  <div class="card pkcard">
    <div class="pkimg" id="pkbox">
      <img alt="${pk.name ? esc(pk.name) : "Today's Pokemon"}" id="pkimg"
        src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pk.id}.png" />
    </div>
    <div>
      <p class="pkname">${pk.name ? esc(pk.name) : "Someone is on the way"}<span class="pkdex">#${String(pk.id).padStart(4,"0")}</span></p>
      ${pk.genus ? `<p class="pkgenus">${esc(pk.genus)}</p>` : ""}
      ${pk.flavor ? `<p class="pkflavor">${esc(pk.flavor)}</p>` : ""}
      <p class="pknote">${pk.note ? esc(pk.note) : "Arriving as soon as there's a signal."}</p>
    </div>
  </div>

  <div class="eyebrow"><span><span class="bl">\u273f</span>Breathe with me</span><span class="n">in 4 &middot; out 6</span></div>
  <div class="card breathwrap">
    <div class="bstage"><div class="bcircle" id="bcircle"></div></div>
    <div class="bword" id="bword"></div>
    <div class="bcount">whenever you need it</div>
  </div>

  <div class="eyebrow"><span><span class="bl">\u273f</span>Kept readings</span><span class="n">${store.kept.length || ""}</span></div>
  <div class="card">
    ${store.kept.length ? store.kept.slice().reverse().map((k,i)=>`
      <div class="kept">
        <div class="kmeta"><span class="bl">\u273f</span>${esc(k.d)} &middot; ${esc(k.p)}</div>
        <p class="ktitle">${esc(k.t)}</p>
        <p class="kbody">${esc(k.b)}</p>
        <button class="krm" data-rm="${store.kept.length-1-i}">Release</button>
      </div>`).join("")
      : `<div class="empty">Anything you keep will wait for you here.</div>`}
  </div>`;
  wire();
  startBreath();
}

function wire(){
  $("#expand").onclick = () => { expanded = !expanded; render(); };
  $("#keep").onclick = () => {
    const r = todayReading();
    if(isKept(r)) store.kept = store.kept.filter(k => (k.k || (k.t+"\u00a7"+k.p)) !== kkey(r));
    else store.kept.push({k:kkey(r), t:r.t, p:r.p, b:r.b, d:dkey()});
    saveStore(); render();
  };
  document.querySelectorAll("[data-care]").forEach(b => {
    b.onclick = () => {
      const i = parseInt(b.dataset.care, 10);
      if(!Number.isInteger(i) || i < 0 || i >= CARE.length) return;
      store.carePick = (carePickToday() === i) ? null : {d: dkey(), i};
      saveStore(); render();
    };
  });
  document.querySelectorAll("[data-rm]").forEach(b => {
    b.onclick = () => {
      const i = parseInt(b.dataset.rm, 10);
      if(Number.isInteger(i) && i >= 0 && i < store.kept.length){
        store.kept.splice(i, 1); saveStore(); render();
      }
    };
  });
  const img = $("#pkimg");
  if(img) img.onerror = () => { const box = $("#pkbox"); if(box) box.innerHTML = `<span class="pkfall">\u2736</span>`; };
}

/* ---------- breathing widget: 4s in, 6s out ---------- */
let breathTimer = null;
function startBreath(){
  if(breathTimer){ clearTimeout(breathTimer); breathTimer = null; }
  const circle = $("#bcircle"), word = $("#bword");
  if(!circle || !word) return;
  const still = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if(still){ word.textContent = "in for 4, out for 6, at your own pace"; return; }
  function inhale(){
    word.textContent = "breathe in";
    circle.style.transition = "transform 4s cubic-bezier(.4,0,.6,1)";
    circle.style.transform = "scale(1.28)";
    breathTimer = setTimeout(exhale, 4000);
  }
  function exhale(){
    word.textContent = "breathe out";
    circle.style.transition = "transform 6s cubic-bezier(.4,0,.6,1)";
    circle.style.transform = "scale(1)";
    breathTimer = setTimeout(inhale, 6000);
  }
  inhale();
}

/* ---------- pokemon lookup, cached forever after first view ---------- */
function fetchDex(id){
  return Promise.all([
    fetch("https://pokeapi.co/api/v2/pokemon/" + id).then(r => r.ok ? r.json() : Promise.reject()),
    fetch("https://pokeapi.co/api/v2/pokemon-species/" + id).then(r => r.ok ? r.json() : Promise.reject())
  ]).then(([pd, sd]) => {
    const types = (pd.types || []).map(x => x.type.name);
    const genus = ((sd.genera || []).find(g => g.language && g.language.name === "en") || {}).genus || "";
    return {n: titleName(pd.name), t: types, g: genus, f: pickFlavor(sd.flavor_text_entries)};
  });
}
function loadPokemon(){
  const id = pk.id, hit = pkCache[id];
  if(hit && "g" in hit){
    pk.name = hit.n; pk.genus = hit.g; pk.flavor = hit.f; pk.note = noteFor(id, hit.t);
    render(); prefetchTomorrow(); return;
  }
  fetchDex(id).then(d => {
    pkCache[id] = d; saveCache();
    pk.name = d.n; pk.genus = d.g; pk.flavor = d.f; pk.note = noteFor(id, d.t);
    render(); prefetchTomorrow();
  }).catch(() => {
    if(hit){ pk.name = hit.n; pk.note = noteFor(id, hit.t); render(); return; }
    pk.name = "Pokemon #" + id;
    pk.note = "Your companion is here in spirit. Its details will load next time there's a signal.";
    render();
  });
}
function prefetchTomorrow(){
  try{
    const nid = dexIdFor(dayNumber() + 1);
    const im = new Image();
    im.src = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/" + nid + ".png";
    if(pkCache[nid] && "g" in pkCache[nid]) return;
    fetchDex(nid).then(d => { pkCache[nid] = d; saveCache(); }).catch(()=>{});
  }catch(e){}
}

/* ---------- rollover: new day, or the greeting's hour has moved on ---------- */
function checkDay(){
  const n = dayNumber(), g = greetBucket();
  if(n !== currentDay){
    currentDay = n; currentGreet = g;
    expanded = false;
    pk = {id: todayDexId(), name:null, genus:null, flavor:null, note:null};
    render();
    loadPokemon();
    return;
  }
  if(g !== currentGreet){ currentGreet = g; render(); }
}
document.addEventListener("visibilitychange", () => { if(!document.hidden) checkDay(); });
window.addEventListener("focus", checkDay);
window.addEventListener("pageshow", checkDay);
setInterval(checkDay, 60000);

render();
loadPokemon();
</script>
