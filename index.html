<html lang="en">

<meta name="apple-mobile-web-app-status-bar-style" content="default" />

<title>Wisteria</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;1,14..32,300;1,14..32,400&family=Fragment+Mono&display=swap');
:root{
  --paper:#F7F4FB; --card:#FCFAFE; --ink:#2A2140; --faint:#6E6480;
  --line:#DFD7EC; --violet:#5B3FA8; --wisteria:#A78BD4; --plum:#3E2C63;
  --bloom:#EFE9F8; --petal-a:#C9B8EC; --petal-b:#B39DDB; --petal-c:#8F76C4;
  --disp:'Space Grotesk','Helvetica Neue',Arial,sans-serif;
  --body:'Inter','Helvetica Neue',Arial,sans-serif;
  --mono:'Fragment Mono',ui-monospace,monospace;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html{color-scheme:light only;}
body{margin:0; color:var(--ink);
  background:
    radial-gradient(90vw 50vh at 15% -8%, #EDE5F9 0%, rgba(237,229,249,0) 60%),
    radial-gradient(70vw 40vh at 100% 0%, #F1EBFA 0%, rgba(241,235,250,0) 55%),
    var(--paper);
  font-family:var(--body); font-size:15px; line-height:1.6;
  min-height:100vh; padding-bottom:calc(40px + env(safe-area-inset-bottom));}
::selection{background:var(--petal-a); color:var(--plum);}

/* ---- the vine: wisteria draped over the doorway ---- */
.vinewrap{position:relative; height:96px; max-width:640px; margin:0 auto;
  pointer-events:none; overflow:visible;}
.vine{position:absolute; top:0; left:0; width:100%; height:150px; overflow:visible;}
.raceme{transform-origin:50% 0;}
@keyframes sway{from{transform:rotate(-1.6deg);} to{transform:rotate(1.8deg);}}
.raceme.s1{animation:sway 7s ease-in-out infinite alternate;}
.raceme.s2{animation:sway 9s ease-in-out infinite alternate; animation-delay:-3s;}
.raceme.s3{animation:sway 11s ease-in-out infinite alternate; animation-delay:-6s;}
.raceme.s4{animation:sway 8s ease-in-out infinite alternate; animation-delay:-1.5s;}

header{max-width:640px; margin:0 auto; padding:0 18px;}
.metarow{display:flex; justify-content:space-between; align-items:baseline;
  font-family:var(--mono); font-size:10px; letter-spacing:.06em;
  text-transform:uppercase; color:var(--faint); margin-bottom:8px;}
h1{font-family:var(--disp); font-size:34px; font-weight:700;
  margin:0; letter-spacing:-.03em; color:var(--plum);}
h1 .dot{color:var(--violet);}
.openrule{height:3px; background:var(--ink); margin:12px 0 0;}

main{max-width:640px; margin:0 auto; padding:16px 18px 8px;}
.eyebrow{font-family:var(--mono); font-size:10px; letter-spacing:.08em;
  text-transform:uppercase; color:var(--violet); margin:24px 0 6px;
  display:flex; justify-content:space-between; align-items:baseline;}
.eyebrow .bl{color:var(--wisteria); margin-right:7px; font-size:11px;}
.eyebrow .n{color:var(--faint); letter-spacing:.04em;}
.card{background:var(--card); border:1px solid var(--line); border-radius:3px;
  padding:16px; margin-bottom:2px; position:relative;}
.rtitle{font-family:var(--disp); font-size:21px; font-weight:600;
  margin:0 0 4px; letter-spacing:-.02em; color:var(--plum);}
.rtag{font-family:var(--mono); font-size:10px; letter-spacing:.06em;
  text-transform:uppercase; color:var(--faint); margin-bottom:10px;}
.rtag b{color:var(--violet); font-weight:400;}
.rbody{font-size:15px; font-weight:300; line-height:1.65; margin:0;}
.rbody.fold{display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow:hidden;}
.breath{margin-top:12px; padding-top:10px; border-top:1px solid var(--line);
  font-size:13.5px; font-style:italic; color:var(--faint);}
.rowbtns{display:flex; gap:8px; margin-top:12px;}
.ghost{background:none; border:1px solid var(--line); border-radius:3px;
  padding:8px 14px; font-family:var(--mono); font-size:10px; letter-spacing:.06em;
  text-transform:uppercase; color:var(--faint); cursor:pointer;}
.ghost:hover{border-color:var(--wisteria); color:var(--violet);}
.ghost.kept{background:var(--violet); border-color:var(--violet); color:#fff;}

.care{display:flex; gap:12px; align-items:flex-start;
  border-left:3px solid var(--wisteria);}
.caremark{font-size:15px; color:var(--wisteria); line-height:1.5; flex:none;}
.careline{font-family:var(--disp); font-size:16.5px; font-weight:500;
  margin:0 0 3px; letter-spacing:-.01em; color:var(--plum);}
.carewhy{font-size:13.5px; font-weight:300; color:var(--faint); margin:0;}

.pkcard{display:flex; gap:14px; align-items:flex-start;}
.pkimg{width:96px; height:96px; flex:none; background:var(--bloom);
  border-radius:58% 42% 55% 45% / 48% 55% 45% 52%;
  display:flex; align-items:center; justify-content:center;}
.pkimg img{width:82px; height:82px; object-fit:contain;}
.pkfall{font-family:var(--disp); font-size:30px; color:var(--wisteria);}
.pkname{font-family:var(--disp); font-size:16px; font-weight:600;
  margin:0 0 1px; letter-spacing:-.01em; color:var(--plum);}
.pkdex{font-family:var(--mono); font-size:10px; color:var(--faint);
  letter-spacing:.05em; margin-left:6px; font-weight:400;}
.pkgenus{font-family:var(--mono); font-size:10px; letter-spacing:.05em;
  text-transform:uppercase; color:var(--faint); margin:0 0 6px;}
.pkflavor{font-size:13.5px; font-weight:300; line-height:1.55; margin:0 0 6px;}
.pknote{font-size:13.5px; font-weight:300; font-style:italic; line-height:1.55;
  margin:0; color:var(--violet);}

.skyline{font-size:15.5px; font-weight:300; font-style:italic; margin:0 0 12px;
  padding-bottom:12px; border-bottom:1px solid var(--line); color:var(--plum);}
.chart{width:100%; border-collapse:collapse; font-size:13.5px; font-weight:300;}
.chart td{padding:6px 4px; border-bottom:1px solid var(--line);}
.chart td.g{width:30px; text-align:center; padding-left:0;}
.glyph{display:inline-flex; align-items:center; justify-content:center;
  width:22px; height:22px; border-radius:50%; background:var(--bloom);
  color:var(--violet); font-size:12px; font-family:var(--body); font-weight:400;}
.chart td.pl{font-family:var(--mono); font-size:10px;
  letter-spacing:.05em; text-transform:uppercase; color:var(--faint); width:30%;}
.chart tr:last-child td{border-bottom:none;}

.kept{padding:12px 2px; border-bottom:1px solid var(--line);}
.kept:last-child{border-bottom:none;}
.kmeta{font-family:var(--mono); font-size:10px; letter-spacing:.05em;
  text-transform:uppercase; color:var(--faint); margin-bottom:3px;}
.kmeta .bl{color:var(--wisteria); margin-right:6px;}
.ktitle{font-family:var(--disp); font-size:14.5px; font-weight:600; margin:0;
  letter-spacing:-.01em; color:var(--plum);}
.kbody{font-size:13.5px; font-weight:300; color:var(--faint); margin:4px 0 0;}
.krm{background:none; border:none; color:var(--faint); font-family:var(--mono);
  font-size:10px; text-transform:uppercase; letter-spacing:.05em; cursor:pointer;
  padding:4px 0 0;}
.krm:hover{color:var(--violet);}
.empty{text-align:center; color:var(--faint); font-style:italic;
  padding:22px 0; font-size:14px; font-weight:300;}
.foot{text-align:center; font-family:var(--mono); font-size:10px;
  letter-spacing:.05em; color:var(--faint); padding:26px 18px 8px;}
button:focus-visible{outline:2px solid var(--violet); outline-offset:2px;}
@media (prefers-reduced-motion: reduce){*{transition:none !important; animation:none !important;}}
</style>
</head>

<header>
  <div class="metarow">
    <span>Wisteria &middot; a soft place</span>
    <span id="dateLbl"></span>
  </div>
  <h1>Wisteria<span class="dot">.</span></h1>
  <div class="openrule"></div>
</header>

<main id="main"></main>
<div class="foot">Everything gentle you do here is roots.</div>

<script>
"use strict";
/* ------------------------------------------------------------------
   Wisteria · one screen, one file, no dependencies, localStorage only.
   Reading library: 41 hand-written + (11 placements x 63 principles)
   = 734 unique daily readings, a hair over two years.
------------------------------------------------------------------ */

const LS_KEY = "wisteria.v2";
const PK_KEY = "wisteria.pkcache";

let store = loadStore();
let pkCache = loadCache();
function loadStore(){
  try{ const s = JSON.parse(localStorage.getItem(LS_KEY));
       return (s && Array.isArray(s.kept)) ? s : {kept:[]}; }
  catch(e){ return {kept:[]}; }
}
function saveStore(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(store)); }catch(e){} }
function loadCache(){
  try{ const c = JSON.parse(localStorage.getItem(PK_KEY));
       return (c && typeof c === "object" && !Array.isArray(c)) ? c : {}; }
  catch(e){ return {}; }
}
function saveCache(){ try{ localStorage.setItem(PK_KEY, JSON.stringify(pkCache)); }catch(e){} }

/* ---------- dates ---------- */
function dkey(d){ d=d||new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function dayNumber(d){ d=d||new Date();
  return Math.floor(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())/86400000); }
function niceDate(d){ d=d||new Date();
  return d.toLocaleDateString("en-US",{weekday:"long", month:"long", day:"numeric"}); }

/* ---------- her chart (from Co–Star) ---------- */
const GLYPHS = {Sun:"\u2609", Moon:"\u263D", Rising:"\u2191", Mercury:"\u263F",
  Venus:"\u2640", Mars:"\u2642", Jupiter:"\u2643", Saturn:"\u2644",
  Uranus:"\u2645", Neptune:"\u2646", Pluto:"\u2647"};
const CHART = [
  ["Sun","Pisces"],["Moon","Scorpio"],["Rising","Gemini · 1st house"],
  ["Mercury","Pisces"],["Venus","Pisces · 9th house"],["Mars","Libra · 4th house"],
  ["Jupiter","Aquarius · 8th house"],["Saturn","Aries · 10th house"],
  ["Uranus","Aquarius"],["Neptune","Capricorn"],["Pluto","Sagittarius · 6th house"]
];

/* ---------- hand-written readings ---------- */
const HAND = [
{t:"Water finds its level", p:"Pisces Sun",
 sky:"Your Pisces Sun is asking for softness today, not force.",
 b:"Your Sun lives in the last sign, the ocean where every river ends. Water never argues its way downhill; it simply keeps moving and arrives anyway. Whatever feels blocked today does not need to be pushed. It needs time, and time is the one thing you actually have.",
 br:"One slow breath in, and let the exhale be longer than the inhale."},
{t:"The moon under the surface", p:"Scorpio Moon",
 sky:"Your Scorpio Moon is running deep today. Feeling a lot is not a malfunction.",
 b:"A Scorpio Moon feels everything at full depth, which is not a flaw but a wide instrument. The Buddhists say a feeling is like weather moving through a valley: real, strong, and temporary. You are the valley, not the storm.",
 br:"Name the feeling quietly, once, and let it sit beside you instead of on you."},
{t:"The curious wind", p:"Gemini Rising",
 sky:"Gemini rising wants to look around today without having to fix anything.",
 b:"You meet the world with Gemini rising: quick, light, interested. Wind does not carry what it passes over. Today, let yourself notice things without needing to hold or solve any of them. Noticing is the whole activity.",
 br:"Look up from the screen once and find one thing you have never noticed before."},
{t:"Soft speech, deep water", p:"Pisces Mercury",
 sky:"Pisces Mercury says the fog is allowed. Clarity is not a deadline.",
 b:"Mercury in Pisces thinks in images and tides rather than straight lines. If your thoughts feel foggy, that is not failure; fog is how the sea breathes onto land. You are allowed to say 'I don't know yet' and mean it kindly.",
 br:"Unclench your jaw. The sentence can finish itself later."},
{t:"Loving what is far away", p:"Pisces Venus · 9th house",
 sky:"Venus in your ninth house is homesick for somewhere you have not been yet.",
 b:"Venus in Pisces in the ninth house loves widely: other places, other lives, big ideas. Longing is not a wound. In the sutras, aspiration is a seed, and seeds are supposed to spend a long while in the dark before anything shows above the soil.",
 br:"Think of one place you love. You do not have to go there today for it to be yours."},
{t:"Peace as a practice", p:"Libra Mars · 4th house",
 sky:"Mars in Libra says keeping your peace counts as winning today.",
 b:"Your Mars works through balance, and it works from home ground. You fight best not by striking but by refusing to be pulled off center, the way a reed survives the storm that snaps the oak. Today, staying steady is the victory.",
 br:"Feel your feet on the floor. That is the whole assignment."},
{t:"The far lantern", p:"Aquarius Jupiter · 8th house",
 sky:"Jupiter in your eighth house is quietly composting something old into something useful.",
 b:"Jupiter in Aquarius grows through what is shared and what is transformed. Old versions of you compost into new ones, the way autumn leaves feed the spring that buries them. Nothing you have been is wasted. It is all soil now.",
 br:"Thank a past version of yourself for one thing, silently."},
{t:"Patience with the beginner", p:"Aries Saturn · 10th house",
 sky:"Saturn in your tenth house is building roots today, which look like nothing from above.",
 b:"Saturn in Aries in the tenth asks you to build slowly in a sign that wants to sprint. Bamboo spends years growing roots before it grows an inch of stalk, then rises faster than anything in the garden. If your progress feels invisible, it is probably roots.",
 br:"Lower the bar for today by one notch, on purpose."},
{t:"The kind revolution", p:"Aquarius Uranus",
 sky:"Uranus in Aquarius says today's change can be quiet and still be real.",
 b:"Your Uranus insists that things can be different. Change in nature is rarely loud: the tide turns without announcing it. Whatever you are quietly becoming does not need anyone's permission, or an audience, or a launch date.",
 br:"One small thing done differently today counts as change."},
{t:"Dreams with structure", p:"Capricorn Neptune",
 sky:"Neptune in Capricorn wants one soft dream given one hard edge today.",
 b:"Neptune in Capricorn dreams in stone and timber: visions that want to be built, not only felt. A mountain is nothing but water and dust that decided to stay. Give one dream a single note, a single step, and let that be enough construction for one day.",
 br:"Write one line of the dream down. Just one."},
{t:"Small daily transformations", p:"Sagittarius Pluto · 6th house",
 sky:"Pluto in your sixth house is doing enormous work inside an ordinary Tuesday.",
 b:"Pluto in the sixth means your deepest changes happen in routines, not in dramatic moments. Rivers carve canyons by showing up daily and never by hurrying. Your small habits are quietly rearranging the landscape while you assume nothing is happening.",
 br:"Do the small thing badly rather than skip it beautifully."},
{t:"The ocean holds everything", p:"Pisces Sun",
 sky:"Your Pisces Sun has room today for two feelings that disagree.",
 b:"An ocean does not choose which rivers it accepts. Your Pisces Sun has that same width: room for contradiction, for grief and hope on the same afternoon. The Zen teachers call it big mind. Nothing you feel today is too much for it.",
 br:"Let two opposite feelings sit in the same room without a referee."},
{t:"Still water sees clearly", p:"Scorpio Moon",
 sky:"Your Scorpio Moon will see the bottom once it stops stirring the water.",
 b:"When a pond is agitated you cannot see the bottom; when it settles, everything is visible without any effort at all. Your Moon wants the truth of things. The fastest route to it today is not digging harder but sitting stiller.",
 br:"Sixty seconds of doing absolutely nothing. Set a timer if it helps."},
{t:"Two birds, one branch", p:"Gemini Rising",
 sky:"Gemini rising is both of you today: the one doing, and the one watching.",
 b:"Gemini is the twins: the you that acts and the you that observes. In the Upanishads two birds sit on one branch; one eats the fruit and worries, one simply watches, at peace. Today, spend a little more time as the watching bird.",
 br:"Watch one of your own thoughts go by like a bus you are not taking."},
{t:"The tide always returns", p:"Pisces Sun",
 sky:"If today is a low tide, your water sign already knows it is not a verdict.",
 b:"Low tide is not the sea failing. Energy, mood, and inspiration all move in tides, and yours are governed by a water sign that knows this in its bones. If today came in low, the only job is refusing to mistake it for forever.",
 br:"Say to yourself: this is a tide, not a verdict."},
{t:"Roots drink in the dark", p:"Scorpio Moon",
 sky:"Your Scorpio Moon needs an unobserved hour, and that hour is productive.",
 b:"Everything a tree does above ground depends entirely on what it does below, unseen and unapplauded. Your Scorpio Moon does its best work in private: processing, composting, understanding. Needing time alone is not withdrawal. It is where the growing happens.",
 br:"Give yourself ten unobserved minutes and call them productive, because they are."},
{t:"Beginner's mind", p:"Gemini Rising",
 sky:"Gemini rising turns not-knowing into freedom today.",
 b:"Suzuki Roshi said that in the beginner's mind there are many possibilities, and in the expert's there are few. Your rising sign never lost the beginner's mind, and the world politely calls it curiosity. It is actually a form of freedom.",
 br:"Ask one question today you would normally be embarrassed not to know."},
{t:"The moon does not hurry", p:"Pisces Venus",
 sky:"Venus in Pisces is removing a deadline from your heart today.",
 b:"The moon takes a month to become full and nobody calls it slow. Whatever is ripening in you, love or work or forgiveness, is allowed a whole cycle. Venus in Pisces loves best when nothing is being timed.",
 br:"Remove one deadline you invented for yourself."},
{t:"Anger as weather", p:"Libra Mars",
 sky:"Mars in Libra is holding something in to keep the peace. Say it gently instead.",
 b:"Mars in Libra often turns anger inward to keep the peace outward. But the sky does not apologize for thunder; it lets it pass through and then clears. A feeling expressed gently is far kinder to everyone than one buried politely.",
 br:"If something stung today, say so in one honest sentence, even just to yourself."},
{t:"The eighth house garden", p:"Aquarius Jupiter · 8th house",
 sky:"Your luckiest planet lives where things end. Something that closed is turning into ground.",
 b:"The eighth house is where things end so other things can begin, and your most generous planet lives there. Any gardener will tell you the compost heap is the most fertile spot on the land. What ended recently is not gone. It is becoming soil.",
 br:"Name one ending that turned out to be a door."},
{t:"Slow is smooth", p:"Aries Saturn",
 sky:"Saturn says rushing today will only make the trip louder, not shorter.",
 b:"Saturn's whole teaching is that slow is smooth and smooth is fast. The glacier moves a few meters a year and shapes entire continents. Hurrying will not get you there sooner; it will only make the journey noisier and less yours.",
 br:"Do the next task at three-quarter speed and notice that nothing collapses."},
{t:"The mirror lake", p:"Pisces Mercury",
 sky:"Pisces Mercury has picked up someone else's mood. You can set it down.",
 b:"A still lake reflects the whole sky without keeping any of it. Mercury in Pisces gives you that reflective mind, which means you absorb other people's weather easily. Remember the lake's other trick: letting the sky go when it changes.",
 br:"Whose feeling are you carrying that is not yours? Set it down gently."},
{t:"Metta for the self", p:"Scorpio Moon",

/* ---------- library assembly: 41 + 11x63 = 734 unique readings ---------- */
function mulberry(seed){ return function(){
  seed |= 0; seed = seed + 0x6D2B79F5 | 0;
  let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
};}
function slotTitle(s){ return ("h" in s) ? HAND[s.h].t : PRINCIPLES[s.ci].tt; }
function buildLib(){
  const lib = [];
  for(let h=0; h<HAND.length; h++) lib.push({h});
  for(let pi=0; pi<PLACEMENTS.length; pi++)
    for(let ci=0; ci<PRINCIPLES.length; ci++) lib.push({pi, ci});
  const rnd = mulberry(20260716);
  for(let i=lib.length-1; i>0; i--){
    const j = Math.floor(rnd()*(i+1)); [lib[i],lib[j]] = [lib[j],lib[i]];
  }
  // Repair pass: no title may appear on two consecutive days, wraparound
  // included, so a repeat is never felt even across the 2-year boundary.
  const L = lib.length;
  for(let pass=0; pass<3; pass++){
    let fixed = true;
    for(let i=0; i<L; i++){
      const prev = lib[(i-1+L)%L], next = lib[(i+1)%L];
      if(slotTitle(lib[i]) !== slotTitle(prev)) continue;
      let swapped = false;
      for(let j=(i+2)%L, step=0; step<L-3; j=(j+1)%L, step++){
        const jp = lib[(j-1+L)%L], jn = lib[(j+1)%L];
        if(slotTitle(lib[j]) === slotTitle(prev)) continue;
        if(slotTitle(lib[j]) === slotTitle(next)) continue;
        if(slotTitle(lib[i]) === slotTitle(jp)) continue;
        if(slotTitle(lib[i]) === slotTitle(jn)) continue;
        [lib[i],lib[j]] = [lib[j],lib[i]]; swapped = true; break;
      }
      if(!swapped) fixed = false;
    }
    if(fixed) break;
  }
  return lib;
}
const LIB = buildLib();
function readingAt(n){
  const slot = LIB[((n % LIB.length) + LIB.length) % LIB.length];
  if("h" in slot) return HAND[slot.h];
  const P = PLACEMENTS[slot.pi], C = PRINCIPLES[slot.ci];
  return {t: C.tt, p: P.p, sky: P.sky[slot.ci % P.sky.length],
          b: P.lore + " " + C.x, br: C.br};
}
function todayReading(){ return readingAt(dayNumber()); }

function dexOrder(){
  const a = []; for(let i=1;i<=DEX_MAX;i++) a.push(i);
  const rnd = mulberry(19980322);
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(rnd()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; }
  return a;
}
const DEX = dexOrder();
function dexIdFor(n){ return DEX[((n % DEX.length) + DEX.length) % DEX.length]; }
function todayDexId(){ return dexIdFor(dayNumber()); }

const NAME_FIX = {
  "mr-mime":"Mr. Mime", "mime-jr":"Mime Jr.", "mr-rime":"Mr. Rime",
  "type-null":"Type: Null", "nidoran-f":"Nidoran ♀", "nidoran-m":"Nidoran ♂",
  "farfetchd":"Farfetch'd", "sirfetchd":"Sirfetch'd", "flabebe":"Flabébé"
};
function titleName(raw){
  const k = String(raw).toLowerCase();
  if(NAME_FIX[k]) return NAME_FIX[k];
  return k.split("-").map(w => w.charAt(0).toUpperCase()+w.slice(1)).join("-");
}
function noteFor(id, types){
  if(PK_NOTES[id]) return PK_NOTES[id];
  const t = (types && types[0]) || "normal";
  const pool = TYPE_NOTES[t] || TYPE_NOTES.normal;
  return pool[((dayNumber() % pool.length) + pool.length) % pool.length];
}
const GRIM = /\bdead\b|\bdie\b|\bdied\b|\bdeath\b|corpse|curse|\bhell\b|kidnap|drags? (it |them |people |children )?(away|off|into)|steal(s|ing)? .*(soul|life|spirit)|suffocat|graveyard|lifespan.*end|eats? (the )?(soul|dream)s?/i;
function pickFlavor(entries){
  const en = (entries || []).filter(e => e.language && e.language.name === "en")
    .map(e => String(e.flavor_text || "").replace(/[\n\f\r\u00ad]+/g," ").replace(/\s+/g," ").trim())
    .filter(s => s.length > 0);
  if(!en.length) return "";
  const gentle = en.find(s => !GRIM.test(s));
  return gentle || en[0];
}

function wire(){

    else store.kept.push({k:kkey(r), t:r.t, p:r.p, b:r.b, d:dkey()});
    saveStore(); render();
  };
  document.querySelectorAll("[data-rm]").forEach(b => {
    b.onclick = () => {
      const i = parseInt(b.dataset.rm, 10);
      if(Number.isInteger(i) && i >= 0 && i < store.kept.length){
        store.kept.splice(i, 1); saveStore(); render();
      }
    };
  });
  const img = $("#pkimg");
  if(img) img.onerror = () => { const box = $("#pkbox"); if(box) box.innerHTML = `<span class="pkfall">✶</span>`; };
}

/* ---------- pokemon lookup, cached forever after first view ---------- */
function fetchDex(id){
  return Promise.all([
    fetch("https://pokeapi.co/api/v2/pokemon/" + id).then(r => r.ok ? r.json() : Promise.reject()),
    fetch("https://pokeapi.co/api/v2/pokemon-species/" + id).then(r => r.ok ? r.json() : Promise.reject())
  ]).then(([pd, sd]) => {
    const types = (pd.types || []).map(x => x.type.name);
    const genus = ((sd.genera || []).find(g => g.language && g.language.name === "en") || {}).genus || "";
    return {n: titleName(pd.name), t: types, g: genus, f: pickFlavor(sd.flavor_text_entries)};
  });
}
function loadPokemon(){
  const id = pk.id, hit = pkCache[id];
  if(hit && "g" in hit){
    pk.name = hit.n; pk.genus = hit.g; pk.flavor = hit.f; pk.note = noteFor(id, hit.t);
    render(); prefetchTomorrow(); return;
  }
  fetchDex(id).then(d => {
    pkCache[id] = d; saveCache();
    pk.name = d.n; pk.genus = d.g; pk.flavor = d.f; pk.note = noteFor(id, d.t);
    render(); prefetchTomorrow();
  }).catch(() => {
    if(hit){ // old cache format without genus/flavor: still show what we have
      pk.name = hit.n; pk.note = noteFor(id, hit.t); render(); return;
    }
    pk.name = "Pokemon #" + id;
    pk.note = "Your companion is here in spirit. Its details will load next time there's a signal.";
    render();
  });
}
/* Quietly cache tomorrow's companion so mornings load instantly,
   and warm the artwork into the browser cache too. */
function prefetchTomorrow(){
  try{
    const nid = dexIdFor(dayNumber() + 1);
    const im = new Image();
    im.src = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/" + nid + ".png";
    if(pkCache[nid] && "g" in pkCache[nid]) return;
    fetchDex(nid).then(d => { pkCache[nid] = d; saveCache(); }).catch(()=>{});
  }catch(e){}
}

/* ---------- day rollover ----------
   A home-screen app can sit in memory for days. Without this, it would
   keep showing yesterday. Checked on resume, on focus, and slowly. */
function checkDay(){
  const n = dayNumber();
  if(n === currentDay) return;
  currentDay = n;
  expanded = false;
  pk = {id: todayDexId(), name:null, genus:null, flavor:null, note:null};
  render();
  loadPokemon();
}
document.addEventListener("visibilitychange", () => { if(!document.hidden) checkDay(); });
window.addEventListener("focus", checkDay);
window.addEventListener("pageshow", checkDay);
setInterval(checkDay, 60000);

render();
loadPokemon();
